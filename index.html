<!DOCTYPE html>
<html>
<head>
<title>Guild Glory Request</title>

<style>
body{
 background:#111;
 color:white;
 text-align:center;
 font-family:Arial;
 padding-top:80px;
}

input{
 padding:12px;
 width:250px;
 border:none;
 border-radius:10px;
 margin-top:20px;
}

button{
 padding:12px 25px;
 border:none;
 border-radius:10px;
 background:red;
 color:white;
 margin-top:20px;
 font-size:18px;
}
</style>
</head>

<body>

<h1>Guild Join Request 🔥</h1>

<input type="text" id="uid" placeholder="Enter Free Fire UID">

<br>

<button onclick="sendRequest()">
Send Request
</button>

<script>
function sendRequest(){
 let uid = document.getElementById("uid").value;

 if(uid==""){
   alert("Enter UID");
 } else {
   alert("Request Sent For UID: " + uid);
 }
}
</script>

</body>
</html>
